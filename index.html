<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RaptorVault</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%231a1408'/%3E%3Crect x='4' y='4' width='92' height='92' rx='18' fill='none' stroke='%23e8b14e' stroke-width='3'/%3E%3Ctext x='50' y='66' font-size='52' text-anchor='middle'%3E%F0%9F%A6%85%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root[data-theme="dark"]{
  --bg:#0e1116; --bg2:#151a21; --surface:#1a202a; --surface2:#212935;
  --border:#2a3340; --text:#e8ecf2; --muted:#8b96a5; --faint:#5d6776;
  --gold:#e8b14e; --gold-dim:#b8893a; --gold-bg:rgba(232,177,78,.12);
  --red:#f0635a; --red-bg:rgba(240,99,90,.12);
  --green:#34c98b; --green-bg:rgba(52,201,139,.12);
  --teal:#4ec9c0; --teal-bg:rgba(78,201,192,.12);
  --purple:#9d8cff; --purple-bg:rgba(157,140,255,.12);
  --shadow:0 8px 30px rgba(0,0,0,.35);
}
:root[data-theme="light"]{
  --bg:#f4f3ef; --bg2:#ecebe5; --surface:#ffffff; --surface2:#f7f6f2;
  --border:#dcdad2; --text:#1d2430; --muted:#5f6a78; --faint:#98a1ad;
  --gold:#b8893a; --gold-dim:#9a7230; --gold-bg:rgba(184,137,58,.12);
  --red:#d2453c; --red-bg:rgba(210,69,60,.10);
  --green:#1d9e6f; --green-bg:rgba(29,158,111,.10);
  --teal:#178f86; --teal-bg:rgba(23,143,134,.10);
  --purple:#6c5ce7; --purple-bg:rgba(108,92,231,.10);
  --shadow:0 8px 24px rgba(30,35,45,.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;min-height:100vh}
h1,h2,h3,.brand{font-family:'Space Grotesk',sans-serif}
button{font-family:'Inter',sans-serif;cursor:pointer}
input,select,textarea{font-family:'Inter',sans-serif;font-size:15px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 12px;width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
label{font-size:12.5px;color:var(--muted);display:block;margin:10px 0 5px;font-weight:500}
::placeholder{color:var(--faint)}
.hidden{display:none!important}

/* ---------- Login ---------- */
#loginScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.login-card{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:36px 30px;box-shadow:var(--shadow)}
.vault-logo{width:64px;height:64px;border-radius:16px;background:var(--gold-bg);border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:30px}
.login-card h1{text-align:center;font-size:24px;letter-spacing:.5px}
.login-card .sub{text-align:center;color:var(--muted);font-size:13px;margin:4px 0 20px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:10px;padding:11px 18px;font-size:14.5px;font-weight:600;transition:transform .08s, opacity .15s}
.btn:active{transform:scale(.97)}
.btn-gold{background:var(--gold);color:#1a1408;width:100%}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red)}
.btn-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green)}
.btn-sm{padding:7px 12px;font-size:13px;border-radius:8px}
.err{color:var(--red);font-size:13px;text-align:center;margin-top:12px;min-height:18px}
.alink{background:none;border:none;color:var(--gold);font-size:13px;font-weight:600;padding:2px}

/* ---------- Shell ---------- */
#app{max-width:1100px;margin:0 auto;padding:0 16px 90px}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 10px;gap:10px}
.brand{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700;letter-spacing:.4px}
.brand .mini-logo{width:36px;height:36px;border-radius:10px;background:var(--gold-bg);border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:18px}
.brand span b{color:var(--gold)}
.hdr-actions{display:flex;gap:8px;align-items:center}
.icon-btn{width:38px;height:38px;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center}
nav{display:flex;gap:6px;overflow-x:auto;padding:6px 0 14px;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:9px 15px;font-size:13.5px;font-weight:600;display:flex;gap:7px;align-items:center}
.tab.active{background:var(--gold-bg);border-color:var(--gold);color:var(--gold)}
.page-title{font-size:19px;margin:6px 0 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}

/* ---------- Cards & grids ---------- */
.grid{display:grid;gap:12px}
.g2{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.g4{grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px}
.stat .lbl{font-size:12.5px;color:var(--muted);font-weight:500;display:flex;align-items:center;gap:6px}
.stat .val{font-size:24px;font-weight:700;font-family:'Space Grotesk';margin-top:5px}
.blurred{filter:blur(9px);transition:filter .25s;cursor:pointer;user-select:none}
.unblurred{filter:none;transition:filter .25s;cursor:pointer}
.sec-title{font-size:14.5px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13.5px}
.row:last-child{border-bottom:none}
.chip{font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.chip-red{background:var(--red-bg);color:var(--red)}
.chip-green{background:var(--green-bg);color:var(--green)}
.chip-gold{background:var(--gold-bg);color:var(--gold)}
.chip-teal{background:var(--teal-bg);color:var(--teal)}
.chip-purple{background:var(--purple-bg);color:var(--purple)}
.muted{color:var(--muted)} .small{font-size:12.5px} .red{color:var(--red)} .green{color:var(--green)} .gold{color:var(--gold)}
.bar-wrap{height:9px;background:var(--surface2);border-radius:6px;overflow:hidden;margin-top:5px}
.bar{height:100%;border-radius:6px}
.bar-row{margin-bottom:13px}
.bar-row .top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:2px}
.empty{color:var(--faint);font-size:13.5px;text-align:center;padding:18px 0}
.del{background:none;border:none;color:var(--faint);font-size:14px;padding:4px}
.del:hover{color:var(--red)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
@media(max-width:560px){.form-grid{grid-template-columns:1fr}}

/* ---------- FAB & Modal ---------- */
#fab{position:fixed;right:20px;bottom:24px;width:58px;height:58px;border-radius:50%;background:var(--gold);color:#1a1408;border:none;font-size:26px;box-shadow:var(--shadow);z-index:40;display:flex;align-items:center;justify-content:center}
#modalRoot{position:fixed;inset:0;background:rgba(8,10,14,.65);backdrop-filter:blur(3px);z-index:60;display:flex;align-items:center;justify-content:center;padding:18px}
.modal{width:100%;max-width:430px;max-height:88vh;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;box-shadow:var(--shadow)}
.modal h3{font-size:17px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.modal .x{background:none;border:none;color:var(--muted);font-size:18px}
.modal .actions{display:flex;gap:10px;margin-top:18px}
.modal .actions .btn{flex:1}

/* ---------- Toast ---------- */
#toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--gold);color:var(--text);border-radius:12px;padding:11px 20px;font-size:13.5px;font-weight:500;opacity:0;transition:all .25s;z-index:80;pointer-events:none;box-shadow:var(--shadow);white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.loading{text-align:center;color:var(--faint);padding:30px 0;font-size:13.5px}
.month-nav{display:flex;align-items:center;gap:8px}
.month-nav button{width:30px;height:30px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--text)}
.month-nav span{font-size:13.5px;font-weight:600;min-width:86px;text-align:center}
.seg{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin:10px 0;flex-wrap:wrap}
@media(max-width:640px){
  body{font-size:14px}
  #app{padding:0 10px 90px}
  header{padding:12px 0 8px}
  .brand{font-size:17px}
  .brand .mini-logo{width:30px;height:30px;font-size:15px}
  .tab{padding:8px 12px;font-size:12.5px}
  .stat .val{font-size:20px}
  .card{padding:13px 14px}
  .modal{padding:18px;max-width:94vw;max-height:92vh}
  .grid.g4{grid-template-columns:repeat(2,1fr)}
  #fab{right:14px;bottom:16px;width:52px;height:52px;font-size:23px}
  .form-grid{grid-template-columns:1fr}
  .row{font-size:12.5px}
  .page-title{font-size:16px}
  .icon-btn{width:34px;height:34px}
}
@media(max-width:380px){
  .grid.g4{grid-template-columns:1fr 1fr}
  .tab{padding:7px 9px;font-size:12px}
}
.seg button{flex:1;border:none;background:none;color:var(--muted);padding:9px;font-size:13px;font-weight:600}
.seg button.on{background:var(--gold-bg);color:var(--gold)}
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div id="loginScreen">
  <div class="login-card">
    <div class="vault-logo">🦅</div>
    <h1>Raptor<span class="gold">Vault</span></h1>
    <p class="sub">Your personal money & life command center</p>
    <div id="authLogin">
      <label>Email</label>
      <input id="loginEmail" type="email" autocomplete="email" placeholder="you@email.com">
      <label>Password</label>
      <input id="loginPass" type="password" autocomplete="current-password" placeholder="••••••••">
      <div style="height:18px"></div>
      <button class="btn btn-gold" id="loginBtn">Unlock vault</button>
      <div style="display:flex;justify-content:space-between;margin-top:14px">
        <button class="alink" id="toSignup">Create account</button>
        <button class="alink" id="toForgot">Forgot password?</button>
      </div>
    </div>
    <div id="authSignup" class="hidden">
      <label>Your name</label>
      <input id="suName" placeholder="Diwan">
      <label>Email</label>
      <input id="suEmail" type="email" placeholder="you@email.com">
      <label>Password (6+ characters)</label>
      <input id="suPass" type="password" placeholder="••••••••">
      <div style="height:18px"></div>
      <button class="btn btn-gold" id="signupBtn">Create account</button>
      <div style="text-align:center;margin-top:14px"><button class="alink" id="toLogin1">← Back to login</button></div>
    </div>
    <div id="authForgot" class="hidden">
      <label>Email</label>
      <input id="fpEmail" type="email" placeholder="you@email.com">
      <div style="height:18px"></div>
      <button class="btn btn-gold" id="forgotBtn">Send reset link</button>
      <div style="text-align:center;margin-top:14px"><button class="alink" id="toLogin2">← Back to login</button></div>
    </div>
    <div id="authReset" class="hidden">
      <p class="sub">Set your new password</p>
      <label>New password (6+ characters)</label>
      <input id="rpPass" type="password" placeholder="••••••••">
      <div style="height:18px"></div>
      <button class="btn btn-gold" id="resetBtn">Set new password</button>
    </div>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="app" class="hidden">
  <header>
    <div class="brand"><div class="mini-logo">🦅</div><span>Raptor<b>Vault</b></span></div>
    <div class="hdr-actions">
      <button class="icon-btn" id="themeBtn" title="Toggle theme">🌙</button>
      <button class="icon-btn" id="logoutBtn" title="Logout">⎋</button>
    </div>
  </header>
  <nav id="nav"></nav>
  <main id="main"><div class="loading">Loading…</div></main>
</div>

<button id="fab" class="hidden" title="Quick spend">＋</button>
<div id="modalRoot" class="hidden"></div>
<div id="toast"></div>

<script>
/* =====================================================
   CONFIG — paste your Supabase publishable key below
===================================================== */
const SB_URL = "https://nsngvbzninahlazarbyi.supabase.co";
const SB_KEY = "sb_publishable_XnNJ8T9rWnW84HDSN4htNA_Rc2i6VfV";

/* ---------------- Supabase REST helpers ---------------- */
const sbHeaders = () => ({
  "apikey": SB_KEY,
  "Authorization": "Bearer " + (SESSION ? SESSION.access_token : SB_KEY),
  "Content-Type": "application/json",
  "Prefer": "return=representation"
});
async function sbQuery(table, params) {
  await freshToken();
  const r = await fetch(SB_URL + "/rest/v1/" + table + "?" + (params || "select=*"), { headers: sbHeaders() });
  if (!r.ok) { console.error(await r.text()); return []; }
  return r.json();
}
async function sbInsert(table, data) {
  await freshToken();
  const r = await fetch(SB_URL + "/rest/v1/" + table, { method: "POST", headers: sbHeaders(), body: JSON.stringify(data) });
  if (!r.ok) { const t = await r.text(); console.error(t); toast("Save failed: " + sbErrMsg(t)); return null; }
  return r.json();
}
function sbErrMsg(t) { try { const d = JSON.parse(t); return d.message || d.hint || d.error || "unknown error"; } catch (e) { return "unknown error"; } }
async function sbUpdate(table, match, data) {
  await freshToken();
  const r = await fetch(SB_URL + "/rest/v1/" + table + "?" + match, { method: "PATCH", headers: sbHeaders(), body: JSON.stringify(data) });
  if (!r.ok) { const t = await r.text(); console.error(t); toast("Update failed: " + sbErrMsg(t)); return null; }
  return r.json();
}
async function sbDelete(table, match) {
  await freshToken();
  const r = await fetch(SB_URL + "/rest/v1/" + table + "?" + match, { method: "DELETE", headers: sbHeaders() });
  if (!r.ok) { const t = await r.text(); console.error(t); toast("Delete failed: " + sbErrMsg(t)); }
}

/* ---------------- Utils ---------------- */
const $ = id => document.getElementById(id);
const esc = s => String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const fmt = n => "₹" + Number(n || 0).toLocaleString("en-IN", { maximumFractionDigits: 0 });
const fmtD = n => "₹" + Number(n || 0).toLocaleString("en-IN", { maximumFractionDigits: 2 });
function curMonth(offset) {
  const d = new Date(); d.setDate(1); d.setMonth(d.getMonth() + (offset || 0));
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
}
function monthLabel(m) {
  const [y, mo] = m.split("-");
  return ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][+mo - 1] + " " + y;
}
function shiftMonth(m, delta) {
  const [y, mo] = m.split("-").map(Number);
  const d = new Date(y, mo - 1 + delta, 1);
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
}
const todayStr = () => new Date().toISOString().slice(0, 10);
function dateLabel(d) {
  if (!d) return "";
  const dt = new Date(d + (d.length === 10 ? "T00:00:00" : ""));
  return dt.toLocaleDateString("en-IN", { day: "numeric", month: "short" });
}
function dtLabel(ts) {
  const dt = new Date(ts);
  return dt.toLocaleDateString("en-IN", { day: "numeric", month: "short" }) + ", " +
         dt.toLocaleTimeString("en-IN", { hour: "numeric", minute: "2-digit" });
}
async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}
let toastTimer = null;
function toast(msg) {
  const t = $("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
}

/* ---------------- Modal ---------------- */
function openModal(html) {
  const root = $("modalRoot");
  root.innerHTML = '<div class="modal">' + html + '</div>';
  root.classList.remove("hidden");
  root.onclick = e => { if (e.target === root) closeModal(); };
}
function closeModal() { $("modalRoot").classList.add("hidden"); $("modalRoot").innerHTML = ""; }

/* ---------------- Theme & session ---------------- */
function applyTheme(t) {
  document.documentElement.setAttribute("data-theme", t);
  localStorage.setItem("rv_theme", t);
  $("themeBtn").textContent = t === "dark" ? "🌙" : "☀️";
}
$("themeBtn").onclick = () => applyTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark");
$("logoutBtn").onclick = async () => {
  try { await authPost("logout", {}, SESSION && SESSION.access_token); } catch (e) {}
  saveSession(null); location.reload();
};

/* ---------------- Supabase Auth ---------------- */
let SESSION = null;
let recoveryToken = null;
function saveSession(s) {
  if (!s) { localStorage.removeItem("rv_session"); SESSION = null; return; }
  if (!s.expires_at_ms) s.expires_at_ms = Date.now() + (s.expires_in ? s.expires_in * 1000 : 3600000);
  SESSION = s; localStorage.setItem("rv_session", JSON.stringify(s));
}
async function authPost(path, body, token) {
  const headers = { "apikey": SB_KEY, "Content-Type": "application/json" };
  if (token) headers["Authorization"] = "Bearer " + token;
  const r = await fetch(SB_URL + "/auth/v1/" + path, { method: "POST", headers: headers, body: JSON.stringify(body || {}) });
  let d = {}; try { d = await r.json(); } catch (e) {}
  if (!r.ok) throw new Error(d.msg || d.error_description || d.message || "Something went wrong");
  return d;
}
async function freshToken() {
  if (!SESSION) return;
  if (Date.now() < SESSION.expires_at_ms - 60000) return;
  try {
    const d = await authPost("token?grant_type=refresh_token", { refresh_token: SESSION.refresh_token });
    saveSession(d);
  } catch (e) { saveSession(null); location.reload(); }
}
function authView(id) {
  ["authLogin", "authSignup", "authForgot", "authReset"].forEach(v => $(v).classList.toggle("hidden", v !== id));
  $("loginErr").textContent = "";
}
$("toSignup").onclick = () => authView("authSignup");
$("toForgot").onclick = () => authView("authForgot");
$("toLogin1").onclick = () => authView("authLogin");
$("toLogin2").onclick = () => authView("authLogin");

$("loginBtn").onclick = async () => {
  const e = $("loginEmail").value.trim(), p = $("loginPass").value;
  if (!e || !p) { $("loginErr").textContent = "Enter email and password"; return; }
  $("loginBtn").textContent = "Unlocking…";
  try {
    const d = await authPost("token?grant_type=password", { email: e, password: p });
    saveSession(d); startApp();
  } catch (err) {
    $("loginErr").textContent = err.message === "Invalid login credentials" ? "Wrong email or password" : err.message;
  }
  $("loginBtn").textContent = "Unlock vault";
};
$("loginPass").addEventListener("keydown", e => { if (e.key === "Enter") $("loginBtn").click(); });

$("signupBtn").onclick = async () => {
  const n = $("suName").value.trim(), e = $("suEmail").value.trim(), p = $("suPass").value;
  if (!n || !e || p.length < 6) { $("loginErr").textContent = "Fill everything (password 6+ chars)"; return; }
  $("signupBtn").textContent = "Creating…";
  try {
    const d = await authPost("signup", { email: e, password: p, data: { display_name: n } });
    if (d.access_token) { saveSession(d); startApp(); }
    else { authView("authLogin"); $("loginErr").textContent = "Check your email to confirm, then login ✉️"; }
  } catch (err) { $("loginErr").textContent = err.message; }
  $("signupBtn").textContent = "Create account";
};

$("forgotBtn").onclick = async () => {
  const e = $("fpEmail").value.trim();
  if (!e) { $("loginErr").textContent = "Enter your email"; return; }
  $("forgotBtn").textContent = "Sending…";
  try {
    await authPost("recover?redirect_to=" + encodeURIComponent(location.origin + location.pathname), { email: e });
    $("loginErr").textContent = "Reset link sent — check your email ✉️";
  } catch (err) { $("loginErr").textContent = err.message; }
  $("forgotBtn").textContent = "Send reset link";
};

$("resetBtn").onclick = async () => {
  const p = $("rpPass").value;
  if (p.length < 6) { $("loginErr").textContent = "Password must be 6+ chars"; return; }
  try {
    const r = await fetch(SB_URL + "/auth/v1/user", { method: "PUT", headers: { "apikey": SB_KEY, "Content-Type": "application/json", "Authorization": "Bearer " + recoveryToken }, body: JSON.stringify({ password: p }) });
    if (!r.ok) { const d = await r.json(); throw new Error(d.msg || "Could not set password"); }
    history.replaceState(null, "", location.pathname);
    authView("authLogin"); $("loginErr").textContent = "Password updated — login now ✅";
  } catch (err) { $("loginErr").textContent = err.message; }
};

/* Generate this month's bill instances + split collections if missing */
async function ensureMonthlyData() {
  const m = curMonth();
  const [tpls, inst] = await Promise.all([
    sbQuery("recurring_bills", "select=*&is_active=eq.true"),
    sbQuery("bill_instances", "select=recurring_bill_id&month=eq." + m)
  ]);
  const have = new Set(inst.map(i => i.recurring_bill_id));
  for (const t of tpls) {
    if (!have.has(t.id)) {
      const day = Math.min(t.due_day, 28);
      await sbInsert("bill_instances", { recurring_bill_id: t.id, name: t.name, amount: t.amount, month: m, due_date: m + "-" + String(day).padStart(2, "0") });
    }
  }
  const [splits, cols] = await Promise.all([
    sbQuery("recurring_splits", "select=*,recurring_split_members(*)&is_active=eq.true"),
    sbQuery("split_collections", "select=member_id&month=eq." + m)
  ]);
  const haveCol = new Set(cols.map(c => c.member_id));
  for (const s of splits) {
    for (const mem of (s.recurring_split_members || [])) {
      if (!haveCol.has(mem.id)) {
        await sbInsert("split_collections", { split_id: s.id, member_id: mem.id, person: mem.person, month: m, amount: mem.share_amount });
      }
    }
  }
}

async function renderDashboard() {
  const m = curMonth();
  const [salaries, spends, loans, loanPays, cardBills, bills, lendings, splitCols, otMembers, snacks, borrowings, incomes, allSpends, allIncomes, allSalaries, recentSpends, recentIncomes] = await Promise.all([
    sbQuery("salaries", "select=amount&month=eq." + m),
    sbQuery("spends", "select=amount,account_id&spent_at=gte." + m + "-01"),
    sbQuery("loans", "select=*&status=eq.active"),
    sbQuery("loan_payments", "select=loan_id,month"),
    sbQuery("card_bills", "select=*,accounts(name)&month=eq." + m),
    sbQuery("bill_instances", "select=*&month=eq." + m + "&order=due_date"),
    sbQuery("lendings", "select=*&status=eq.pending&order=expected_date"),
    sbQuery("split_collections", "select=*,recurring_splits(name)&month=eq." + m + "&status=eq.pending"),
    sbQuery("onetime_split_members", "select=*,onetime_splits(title)&status=eq.pending"),
    sbQuery("snack_entries", "select=amount&entry_type=eq.sale&status=eq.pending"),
    sbQuery("borrowings", "select=*&status=eq.pending&order=due_date"),
    sbQuery("incomes", "select=amount&received_at=gte." + m + "-01"),
    sbQuery("spends", "select=amount,account_id,spent_at"),
    sbQuery("incomes", "select=amount,account_id,received_at"),
    sbQuery("salaries", "select=amount,account_id,created_at"),
    sbQuery("spends", "select=*,accounts(name)&order=spent_at.desc&limit=10"),
    sbQuery("incomes", "select=*,accounts(name)&order=received_at.desc&limit=10")
  ]);
  if (activeTab !== "dashboard") return;

  const ccIds = new Set(ACCOUNTS.filter(a => a.type === "credit_card").map(a => a.id));
  const salary = salaries.reduce((a, b) => a + +b.amount, 0);
  const extraIn = incomes.reduce((a, b) => a + +b.amount, 0);
  const balances = ACCOUNTS.filter(a => a.type !== "credit_card").map(a => {
    const setAt = a.balance_set_at || "1970-01-01";
    const sp = allSpends.filter(s => s.account_id === a.id && s.spent_at > setAt).reduce((x, y) => x + +y.amount, 0);
    const inc = allIncomes.filter(s => s.account_id === a.id && s.received_at > setAt).reduce((x, y) => x + +y.amount, 0);
    const sal = allSalaries.filter(s => s.account_id === a.id && s.created_at > setAt).reduce((x, y) => x + +y.amount, 0);
    return { acc: a, bal: +(a.opening_balance || 0) + sal + inc - sp, isSet: !!a.balance_set_at };
  });
  const recentTx = [
    ...recentSpends.map(s => ({ out: true, label: s.item, amt: +s.amount, acc: s.accounts ? s.accounts.name : "", at: s.spent_at })),
    ...recentIncomes.map(i => ({ out: false, label: i.source, amt: +i.amount, acc: i.accounts ? i.accounts.name : "", at: i.received_at }))
  ].sort((a, b) => new Date(b.at) - new Date(a.at)).slice(0, 12);
  const savingsSet = balances.filter(b => b.isSet).length;
  const totalSavings = balances.filter(b => b.isSet).reduce((a, b) => a + b.bal, 0);
  const spent = spends.filter(s => !ccIds.has(s.account_id)).reduce((a, b) => a + +b.amount, 0);
  const ccMonthSpend = {};
  spends.forEach(s => { if (ccIds.has(s.account_id)) ccMonthSpend[s.account_id] = (ccMonthSpend[s.account_id] || 0) + +s.amount; });
  const loanInfo = loans.map(l => {
    const paidSet = new Set(loanPays.filter(p => p.loan_id === l.id).map(p => p.month));
    const pend = loanMonthsPending(l, paidSet);
    return { name: l.name, balance: pend.length * +l.emi_amount, left: pend.length, end: l.end_month };
  }).filter(l => l.balance > 0).sort((a, b) => b.balance - a.balance);
  const loanDebt = loanInfo.reduce((a, b) => a + b.balance, 0);
  const cardInfo = ACCOUNTS.filter(a => a.type === "credit_card" && a.is_active).map(c => {
    const bill = cardBills.find(b => b.account_id === c.id);
    const debt = (bill && bill.status === "pending") ? +bill.amount_due : (ccMonthSpend[c.id] || 0);
    return { name: c.name, debt: debt, due: bill ? bill.due_date : null, hasBill: !!bill };
  }).filter(c => c.debt > 0);
  const cardDebt = cardInfo.reduce((a, b) => a + b.debt, 0);
  const oweMe = lendings.reduce((a, b) => a + +b.amount, 0)
    + splitCols.reduce((a, b) => a + +b.amount, 0)
    + otMembers.reduce((a, b) => a + +b.amount, 0)
    + snacks.reduce((a, b) => a + +b.amount, 0);

  const today = todayStr();
  const pendingBills = bills.filter(b => b.status === "pending");
  const maxDebt = Math.max(...loanInfo.map(l => l.balance), ...cardInfo.map(c => c.debt), 1);

  let debtBars = "";
  loanInfo.forEach(l => {
    debtBars += '<div class="bar-row"><div class="top"><span>' + esc(l.name) + ' <span class="muted">· ' + l.left + ' EMIs left · ends ' + monthLabel(l.end) + '</span></span><span class="muted">' + fmt(l.balance) + '</span></div><div class="bar-wrap"><div class="bar" style="width:' + Math.max(3, l.balance / maxDebt * 100) + '%;background:var(--gold)"></div></div></div>';
  });
  cardInfo.forEach(c => {
    debtBars += '<div class="bar-row"><div class="top"><span>' + esc(c.name) + ' <span class="muted">· ' + (c.hasBill ? "due " + dateLabel(c.due) : "this month’s spend") + '</span></span><span class="muted">' + fmt(c.debt) + '</span></div><div class="bar-wrap"><div class="bar" style="width:' + Math.max(3, c.debt / maxDebt * 100) + '%;background:var(--red)"></div></div></div>';
  });
  if (!debtBars) debtBars = '<div class="empty">No active debts. Vault is free! 🎉</div>';

  const oweRows = [
    ...lendings.map(l => ({ t: "lend", id: l.id, who: l.person, what: "lent on " + dateLabel(l.given_date), amt: +l.amount })),
    ...splitCols.map(s => ({ t: "col", id: s.id, who: s.person, what: (s.recurring_splits ? s.recurring_splits.name : "split") + " " + monthLabel(s.month), amt: +s.amount })),
    ...otMembers.map(o => ({ t: "ot", id: o.id, who: o.person, what: o.onetime_splits ? o.onetime_splits.title : "split", amt: +o.amount }))
  ];

  $("main").innerHTML =
    '<div class="grid g4">' +
      '<div class="card stat"><div class="lbl">🔒 Salary · ' + monthLabel(m) + '</div><div class="val blurred" id="salaryVal">' + fmt(salary) + '</div>' +
        '<button class="btn btn-ghost btn-sm" style="margin-top:10px" id="setSalaryBtn">' + (salary ? "Edit" : "Set salary") + '</button>' +
        (extraIn ? '<div class="small green" style="margin-top:8px">+ ' + fmt(extraIn) + ' money in this month</div>' : "") + '</div>' +
      '<div class="card stat"><div class="lbl">💸 Spent this month</div><div class="val">' + fmt(spent) + '</div>' +
        '<div class="small muted" style="margin-top:10px">' + (salary ? Math.round(spent / salary * 100) + "% of salary" : "set salary to compare") + '</div></div>' +
      '<div class="card stat"><div class="lbl">🏦 Total debt</div><div class="val">' + fmt(loanDebt + cardDebt) + '</div>' +
        '<div class="small muted" style="margin-top:10px">' + fmt(loanDebt) + ' loans · ' + fmt(cardDebt) + ' cards</div></div>' +
      '<div class="card stat"><div class="lbl">🤝 People owe me</div><div class="val ' + (oweMe ? "red" : "green") + '">' + fmt(oweMe) + '</div>' +
        '<div class="small muted" style="margin-top:10px">' + oweRows.length + ' pending + snacks</div></div>' +
      '<div class="card stat"><div class="lbl">\u{1F4B0} Savings balance</div><div class="val ' + (savingsSet ? (totalSavings < 0 ? "red" : "green") : "") + '">' + (savingsSet ? fmt(totalSavings) : "\u2014") + '</div>' +
        '<div class="small muted" style="margin-top:10px">' + (savingsSet ? savingsSet + ' account(s) tracked' : "set balances below") + '</div></div>' +
    '</div>' +
    '<div style="height:14px"></div>' +
    '<div class="card" style="margin-bottom:14px"><div class="sec-title">\u{1F4BC} My accounts <span class="small muted">live balance</span></div>' +
    balances.map(b =>
      '<div class="row"><span>' + esc(b.acc.name) + (b.isSet ? "" : ' <span class="small muted">\u00b7 set balance to start tracking</span>') + '</span>' +
      '<span style="display:flex;align-items:center;gap:8px"><b class="' + (b.bal < 0 ? "red" : b.isSet ? "green" : "muted") + '">' + (b.isSet ? fmt(b.bal) : "\u2014") + '</b>' +
      '<button class="btn btn-ghost btn-sm setBal" data-id="' + b.acc.id + '" data-name="' + esc(b.acc.name) + '">\u270E</button></span></div>'
    ).join("") + '</div>' +
    '<div class="card"><div class="sec-title">📉 Debt breakdown <span class="small muted">gold = loans · red = cards</span></div>' + debtBars + '</div>' +
    '<div style="height:14px"></div>' +
    '<div class="grid g2">' +
      '<div class="card"><div class="sec-title">📅 Bills this month</div>' +
        (pendingBills.length ? pendingBills.map(b =>
          '<div class="row"><span>' + esc(b.name) + '<br><span class="small ' + (b.due_date < today ? "red" : "muted") + '">' + fmt(b.amount) + " · " + dateLabel(b.due_date) + (b.due_date < today ? " · OVERDUE ⚠" : "") + '</span></span>' +
          '<button class="btn btn-green btn-sm payDB" data-id="' + b.id + '" data-name="' + esc(b.name) + '" data-amt="' + b.amount + '">Mark paid</button></div>'
        ).join("") : '<div class="empty">All bills paid ✅</div>') + '</div>' +
      '<div class="card"><div class="sec-title">🔴 Pending from people</div>' +
        (oweRows.length ? oweRows.slice(0, 8).map(r =>
          '<div class="row"><span class="red">' + esc(r.who) + ' <span class="muted small">· ' + esc(r.what) + '</span></span>' +
          '<span style="display:flex;align-items:center;gap:7px"><span class="chip chip-red">' + fmt(r.amt) + '</span><button class="btn btn-green btn-sm markOweD" data-t="' + r.t + '" data-id="' + r.id + '" data-person="' + esc(r.who) + '" data-amt="' + r.amt + '">✓</button></span></div>'
        ).join("") : '<div class="empty">Nobody owes you. Peaceful 😌</div>') +
        (borrowings.length ? '<div class="sec-title" style="margin-top:14px">⚠️ I have to give</div>' + borrowings.slice(0, 5).map(b =>

        ).join("") : "") + '</div>' +
    '</div>' +
    '<div style="height:14px"></div>' +
    '<div class="card"><div class="sec-title">🕑 Recent activity</div>' +
    (recentTx.length ? recentTx.map(t =>
      '<div class="row"><span>' + (t.out ? "💸" : "💰") + " " + esc(t.label) + '<br><span class="small muted">' + dtLabel(t.at) + (t.acc ? " · " + esc(t.acc) : "") + '</span></span><b class="' + (t.out ? "red" : "green") + '">' + (t.out ? "−" : "+") + fmt(t.amt) + '</b></div>'

  $("main").querySelectorAll(".setBal").forEach(b => b.onclick = () => {

      await sbUpdate("bill_instances", "id=eq." + b.dataset.id, { status: "paid", paid_at: new Date().toISOString(), account_id: +$("dbAcc").value });
      await sbInsert("spends", { item: b.dataset.name + " bill", amount: +b.dataset.amt, account_id: +$("dbAcc").value, category: "Bills" });

      else if (t === "col") await sbUpdate("split_collections", "id=eq." + id, { status: "received", paid_at: new Date().toISOString() });
      else await sbUpdate("onetime_split_members", "id=eq." + id, { status: "received", paid_at: new Date().toISOString() });
      await sbInsert("incomes", { source: person + (t === "lend" ? " - repaid" : " - split"), amount: +amt, account_id: +$("owdAcc").value });
      closeModal(); toast("Received ✓"); renderDashboard();

  $("main").querySelectorAll(".payBorD").forEach(b => b.onclick = () => {

function salaryModal(m, current) {
  openModal('<h3>Salary · ' + monthLabel(m) + ' <button class="x" onclick="closeModal()">✕</button></h3>' +
    '<label>Total amount received this month</label><input id="salAmt" type="number" inputmode="decimal" value="' + (current || "") + '" placeholder="e.g. 62000">' +
    '<label>Received into</label><select id="salAcc">' + accountOptions() + '</select>' +
    '<label>Note (optional)</label><input id="salNote" placeholder="Salary + incentive etc.">' +
    '<div class="actions"><button class="btn btn-gold" id="salSave">Save</button></div>');
  $("salSave").onclick = async () => {
    const amt = +$("salAmt").value;
    if (!amt) { toast("Enter amount"); return; }
    const existing = await sbQuery("salaries", "select=id&month=eq." + m);
    if (existing.length) await sbUpdate("salaries", "id=eq." + existing[0].id, { amount: amt, note: $("salNote").value, account_id: +$("salAcc").value });
    else await sbInsert("salaries", { month: m, amount: amt, note: $("salNote").value, account_id: +$("salAcc").value });
    closeModal(); toast("Salary saved 🔒"); renderDashboard();
  };
}

        (done ? "" : '<button class="btn btn-gold btn-sm payEmi" data-id="' + l.id + '" data-name="' + esc(l.name) + '" data-emi="' + l.emi_amount + '" data-month="' + (pend[0] || m) + '">Pay ' + monthLabel(pend[0] || m) + ' EMI</button>') +

function loanMonthsPending(loan, paidSet) {
  const out = []; let mm = curMonth(); let guard = 0;
  while (mm <= loan.end_month && guard < 600) {
    if (!paidSet.has(mm)) out.push(mm);
    mm = shiftMonth(mm, 1); guard++;
  }
  return out;
}

/* =====================================================
   SNACKS \u2014 retail shop ledger with item catalog
===================================================== */
async function renderSnacks() {
  const [rows, items] = await Promise.all([
    sbQuery("snack_entries", "select=*&order=entry_date.desc,id.desc&limit=200"),
    sbQuery("snack_items", "select=*&order=name")
  ]);
  if (activeTab !== "snacks") return;
  const invested = rows.filter(r => r.entry_type === "stock_in" || r.entry_type === "investment").reduce((a, b) => a + +b.amount, 0);
  const received = rows.filter(r => ((r.entry_type === "sale") && r.status === "done") || r.entry_type === "collection").reduce((a, b) => a + +b.amount, 0);
  const creditPend = rows.filter(r => r.entry_type === "sale" && r.status === "pending");
  const pendAmt = creditPend.reduce((a, b) => a + +b.amount, 0);
  const profit = received - invested;
  const itemMap = {}; items.forEach(it => itemMap[it.name.toLowerCase()] = it);

  const byPerson = {};
  creditPend.forEach(r => { const p = r.person || "Unknown"; (byPerson[p] = byPerson[p] || []).push(r); });

  $("main").innerHTML =
    '<div class="page-title"><span>\u{1F36A} Raptor Snacks Shop</span><div style="display:flex;gap:8px"><button class="btn btn-ghost btn-sm" id="manageItemsBtn">\u{1F4E6} Manage items</button><button class="btn btn-gold btn-sm" id="addSnackBtn">+ Shop entry</button></div></div>' +
    '<div class="grid g4" style="margin-bottom:14px">' +
      '<div class="card stat"><div class="lbl">\u{1F4E6} Invested in stock</div><div class="val">' + fmt(invested) + '</div></div>' +
      '<div class="card stat"><div class="lbl">\u{1F4B5} Cash received</div><div class="val">' + fmt(received) + '</div></div>' +
      '<div class="card stat"><div class="lbl">\u{1F4D5} Credit pending</div><div class="val ' + (pendAmt ? "red" : "") + '">' + fmt(pendAmt) + '</div></div>' +
      '<div class="card stat"><div class="lbl">\u{1F4C8} Profit / loss</div><div class="val ' + (profit >= 0 ? "green" : "red") + '">' + (profit >= 0 ? "+" : "") + fmt(profit) + '</div></div></div>' +

    '<div class="card" style="margin-bottom:14px"><div class="sec-title">\u{1F4D5} Credit book \u00b7 who owes the shop</div>' +
    (Object.keys(byPerson).length ? Object.entries(byPerson).map(([p, entries]) => {
      const tot = entries.reduce((a, b) => a + +b.amount, 0);
      return '<div style="padding:8px 0;border-bottom:1px solid var(--border)">' +
        '<div class="row" style="border:none;padding:0 0 4px"><span class="red"><b>' + esc(p) + '</b></span><span class="chip chip-red">owes ' + fmt(tot) + '</span></div>' +
        entries.map(r =>
          '<div class="row" style="padding:5px 0"><span class="small">' + esc(r.item || "items") + (r.qty ? " \u00d7 " + r.qty : "") + (r.unit_price ? " @ " + fmt(r.unit_price) : "") + ' <span class="muted">\u00b7 ' + dateLabel(r.entry_date) + '</span></span>' +
          '<span style="display:flex;align-items:center;gap:6px"><b class="red">' + fmt(r.amount) + '</b>' +
          '<button class="btn btn-ghost btn-sm editSnack" data-id="' + r.id + '" data-item="' + esc(r.item || "") + '" data-qty="' + (r.qty || 1) + '" data-price="' + (r.unit_price || r.amount) + '" data-person="' + esc(r.person || "") + '">\u270E</button>' +
          '<button class="btn btn-green btn-sm collectSnack" data-id="' + r.id + '" data-person="' + esc(p) + '" data-item="' + esc(r.item || "items") + '" data-amt="' + r.amount + '">\u2713</button></span></div>'
        ).join("") + '</div>';
    }).join("") : '<div class="empty">No credit pending \u2014 all customers settled \u{1F389}</div>') + '</div>' +

    '<div class="card" style="margin-bottom:14px"><div class="sec-title">\u{1F4E6} Item catalog <span class="small muted">cost \u00b7 sale price \u00b7 margin</span></div>' +
    (items.length ? items.map(it => {
      const margin = (it.sale_price && it.cost_price) ? it.sale_price - it.cost_price : null;
      return '<div class="row"><span>' + esc(it.name) + '</span><span class="small muted">cost ' + (it.cost_price ? fmt(it.cost_price) : "\u2014") + ' \u00b7 sale ' + (it.sale_price ? fmt(it.sale_price) : "\u2014") + (margin !== null ? ' \u00b7 <span class="' + (margin >= 0 ? "green" : "red") + '">margin ' + fmt(margin) + '</span>' : "") + '</span></div>';
    }).join("") : '<div class="empty">Items appear here automatically as you log stock & sales</div>') + '</div>' +

    '<div class="card"><div class="sec-title">\u{1F9FE} Shop ledger \u00b7 stock in & sales out</div>' +
    (rows.length ? rows.slice(0, 50).map(r => {
      const isIn = r.entry_type === "stock_in" || r.entry_type === "investment";
      const isCol = r.entry_type === "collection";
      const arrow = isIn ? '<span class="chip chip-gold">\u2B07 IN</span>' : isCol ? '<span class="chip chip-green">\u{1F4B5} PAID</span>' : '<span class="chip chip-teal">\u2B06 OUT</span>';
      const desc = (r.item ? esc(r.item) : (isIn ? "stock purchase" : isCol ? "payment received" : "sale")) + (r.qty ? " \u00d7 " + r.qty : "") + (r.unit_price ? " @ " + fmt(r.unit_price) : "");
      const who = r.person ? (isIn ? " \u00b7 from " + esc(r.person) : " \u00b7 " + esc(r.person)) : "";
      const pay = r.entry_type === "sale" ? (r.status === "pending" ? ' <span class="chip chip-red">credit</span>' : ' <span class="chip chip-green">cash</span>') : "";
      return '<div class="row"><span>' + arrow + " " + desc + '<span class="small muted">' + who + " \u00b7 " + dateLabel(r.entry_date) + (r.note ? " \u00b7 " + esc(r.note) : "") + '</span>' + pay + '</span>' +
        '<span style="display:flex;align-items:center;gap:6px"><b class="' + (isIn ? "" : "green") + '">' + (isIn ? "\u2212" : "+") + fmt(r.amount) + '</b><button class="del delSnk" data-id="' + r.id + '">\u{1F5D1}</button></span></div>';
    }).join("") : '<div class="empty">Shop is empty \u2014 add your first stock purchase</div>') + '</div>' +
    '';

  $("addSnackBtn").onclick = () => snackEntryModal(itemMap, items);
  $("manageItemsBtn").onclick = () => itemManagerModal(items);

  $("main").querySelectorAll(".editSnack").forEach(b => b.onclick = () => snackEditModal(b.dataset));

  $("main").querySelectorAll(".collectSnack").forEach(b => b.onclick = () => {
    openModal('<h3>Collect from ' + b.dataset.person + ' <button class="x" onclick="closeModal()">\u2715</button></h3>' +
      '<p class="small muted">' + esc(b.dataset.item) + ' \u00b7 ' + fmt(b.dataset.amt) + '</p>' +
      '<label>Received into</label><select id="snkColAcc">' + accountOptions() + '</select>' +
      '<div class="actions"><button class="btn btn-green" id="snkColSave">Confirm \u00b7 ' + fmt(b.dataset.amt) + '</button></div>');
    $("snkColSave").onclick = async () => {
      await sbUpdate("snack_entries", "id=eq." + b.dataset.id, { status: "done" });
      await sbInsert("incomes", { source: b.dataset.person + " - " + b.dataset.item, amount: +b.dataset.amt, account_id: +$("snkColAcc").value });
      closeModal(); toast("Credit collected \u2713"); renderSnacks();
    };
  });
  $("main").querySelectorAll(".delSnk").forEach(b => b.onclick = async () => {
    if (!confirm("Delete this ledger entry?")) return;
    await sbDelete("snack_entries", "id=eq." + b.dataset.id); renderSnacks();
  });
}

async function upsertSnackItem(name, field, value) {
  if (!name) return;
  const existing = await sbQuery("snack_items", "select=id&name=ilike." + encodeURIComponent(name));
  if (existing.length) await sbUpdate("snack_items", "id=eq." + existing[0].id, { [field]: value });
  else await sbInsert("snack_items", { name: name, [field]: value });
}

function snackEntryModal(itemMap, items) {
  const itemOptions = '<option value="">\u2014 select item \u2014</option>' +
    items.map(it => '<option value="' + esc(it.name) + '">' + esc(it.name) + '</option>').join("") +
    '<option value="__new__">+ New item\u2026</option>';

  openModal('<h3>Shop entry <button class="x" onclick="closeModal()">\u2715</button></h3>' +
    '<div class="seg" id="snkSeg"><button class="on" data-t="stock_in">\u{1F4E6} Stock in</button><button data-t="sale">\u{1F6D2} Sale</button><button data-t="collection">\u{1F4B5} Payment recd</button></div>' +
    '<div id="snItemWrap">' +
      '<label>Item</label><select id="snItemSel">' + itemOptions + '</select>' +
      '<input id="snItemNew" class="hidden" placeholder="New item name\u2026" style="margin-top:8px">' +
    '</div>' +
    '<div id="snQtyWrap" class="form-grid">' +
      '<div><label id="snQtyLbl">Quantity</label><input id="snQty" type="number" value="1"></div>' +
      '<div><label id="snPriceLbl">Cost per unit</label><input id="snPrice" type="number" step="0.01" placeholder="10"></div>' +
    '</div>' +
    '<div id="snTotalWrap" class="small muted" style="margin:6px 0 4px">Total: \u20b90</div>' +
    '<div id="snColWrap" class="hidden"><label>Amount received</label><input id="snColAmt" type="number" placeholder="500"></div>' +
    '<div id="snPersonWrap" class="hidden"><label id="snPersonLbl">Sold to</label><input id="snPerson" placeholder="Name"></div>' +
    '<div id="snPayWrap" class="hidden"><label>Payment</label><div class="seg" id="snPaySeg"><button class="on" data-p="cash">\u{1F4B5} Cash now</button><button data-p="credit">\u{1F4D5} Credit (pending)</button></div></div>' +
    '<div id="snAccWrap"><label id="snAccLbl">Paid from</label><select id="snAcc">' + accountOptions() + '</select></div>' +
    '<label>Note (optional)</label><input id="snNote" placeholder="\u2026">' +
    '<div class="actions"><button class="btn btn-gold" id="snSave">Save entry</button></div>');

  let type = "stock_in", pay = "cash";
  const recalc = () => {
    const qty = +$("snQty").value || 0, price = +$("snPrice").value || 0;
    $("snTotalWrap").textContent = "Total: " + fmt(qty * price);
  };
  $("snQty").oninput = recalc; $("snPrice").oninput = recalc;

  function currentItemName() {
    return $("snItemSel").value === "__new__" ? $("snItemNew").value.trim() : $("snItemSel").value;
  }

  $("snItemSel").onchange = () => {
    const v = $("snItemSel").value;
    $("snItemNew").classList.toggle("hidden", v !== "__new__");
    if (v === "__new__") { $("snItemNew").focus(); $("snPrice").value = ""; recalc(); return; }
    const it = itemMap[v.toLowerCase()];
    if (!it) return;
    if (type === "stock_in" && it.cost_price) $("snPrice").value = it.cost_price;
    if (type === "sale" && it.sale_price) $("snPrice").value = it.sale_price;
    recalc();
  };

  function setType(t) {
    type = t;
    $("snItemWrap").classList.toggle("hidden", t === "collection");
    $("snQtyWrap").classList.toggle("hidden", t === "collection");
    $("snTotalWrap").classList.toggle("hidden", t === "collection");
    $("snColWrap").classList.toggle("hidden", t !== "collection");
    $("snPersonWrap").classList.toggle("hidden", t === "stock_in");
    $("snPayWrap").classList.toggle("hidden", t !== "sale");
    $("snAccWrap").classList.toggle("hidden", t === "sale" && pay === "credit");
    $("snQtyLbl").textContent = "Quantity";
    $("snPriceLbl").textContent = t === "stock_in" ? "Cost per unit" : "Sale price per unit";
    $("snPersonLbl").textContent = t === "sale" ? "Sold to" : "Received from";
    $("snAccLbl").textContent = t === "stock_in" ? "Paid from" : "Received into";
    if ($("snItemSel").value && $("snItemSel").value !== "__new__") {
      const it = itemMap[$("snItemSel").value.toLowerCase()];
      $("snPrice").value = it ? (t === "stock_in" ? (it.cost_price || "") : (it.sale_price || "")) : "";
    } else {
      $("snPrice").value = "";
    }
    recalc();
  }
  document.querySelectorAll("#snkSeg button").forEach(b => b.onclick = () => {
    document.querySelectorAll("#snkSeg button").forEach(x => x.classList.remove("on"));
    b.classList.add("on"); setType(b.dataset.t);
  });
  document.querySelectorAll("#snPaySeg button").forEach(b => b.onclick = () => {
    document.querySelectorAll("#snPaySeg button").forEach(x => x.classList.remove("on"));
    b.classList.add("on"); pay = b.dataset.p;
    $("snAccWrap").classList.toggle("hidden", pay === "credit");
  });

  $("snSave").onclick = async () => {
    const item = currentItemName();
    if (type === "collection") {
      const amt = +$("snColAmt").value; if (!amt) { toast("Enter amount"); return; }
      const person = $("snPerson").value.trim();
      await sbInsert("snack_entries", { entry_type: "collection", amount: amt, person: person || null, status: "done", entry_date: todayStr(), account_id: +$("snAcc").value, note: $("snNote").value || null });
      await sbInsert("incomes", { source: (person || "Shop") + " - payment", amount: amt, account_id: +$("snAcc").value });
      closeModal(); toast("Payment recorded \u{1F9FE}"); renderSnacks();
      return;
    }
    const qty = +$("snQty").value || 1, price = +$("snPrice").value;
    if (!item || !price) { toast("Pick or name an item, and enter a price"); return; }
    const total = qty * price;
    if (type === "stock_in") {
      await upsertSnackItem(item, "cost_price", price);
      await sbInsert("snack_entries", { entry_type: "stock_in", item: item, qty: qty, unit_price: price, amount: total, entry_date: todayStr(), account_id: +$("snAcc").value, note: $("snNote").value || null });
      await sbInsert("spends", { item: "Snack stock: " + item, amount: total, account_id: +$("snAcc").value, category: "Snacks stock" });
      closeModal(); toast(item + " stocked \u00b7 " + fmt(total)); renderSnacks();
    } else {
      if (pay === "credit" && !$("snPerson").value.trim()) { toast("Credit sale needs a name"); return; }
      await upsertSnackItem(item, "sale_price", price);
      const person = $("snPerson").value.trim();
      await sbInsert("snack_entries", { entry_type: "sale", item: item, qty: qty, unit_price: price, amount: total, person: person || null, payment: pay, status: pay === "credit" ? "pending" : "done", entry_date: todayStr(), account_id: pay === "cash" ? +$("snAcc").value : null, note: $("snNote").value || null });
      if (pay === "cash") await sbInsert("incomes", { source: (person ? person + " - " : "") + item + " sale", amount: total, account_id: +$("snAcc").value });
      closeModal(); toast(item + " sold \u00b7 " + fmt(total)); renderSnacks();
    }
  };
  setType("stock_in");
}

function itemManagerModal(items) {
  openModal('<h3>\u{1F4E6} Manage items <button class="x" onclick="closeModal()">\u2715</button></h3>' +
    '<p class="small muted" style="margin-bottom:10px">Set cost price (what you paid) and sale price (what you charge) for each item. These auto-fill next time you log stock or a sale.</p>' +
    '<div id="imList">' + (items.length ? items.map(it =>
      '<div class="form-grid" style="align-items:end;margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:8px">' +
        '<div style="grid-column:1/-1"><label style="margin:0 0 4px">' + esc(it.name) + '</label></div>' +
        '<div><label style="margin:0 0 4px">Cost price</label><input type="number" step="0.01" class="imCost" data-id="' + it.id + '" value="' + (it.cost_price || "") + '"></div>' +
        '<div><label style="margin:0 0 4px">Sale price</label><input type="number" step="0.01" class="imSale" data-id="' + it.id + '" value="' + (it.sale_price || "") + '"></div>' +
      '</div>'
    ).join("") : '<div class="empty">No items yet \u2014 add one below</div>') + '</div>' +
    '<label>Add new item</label>' +
    '<div class="form-grid"><div><input id="imNewName" placeholder="Item name"></div><div></div>' +
    '<div><input id="imNewCost" type="number" step="0.01" placeholder="Cost price"></div>' +
    '<div><input id="imNewSale" type="number" step="0.01" placeholder="Sale price"></div></div>' +
    '<div class="actions"><button class="btn btn-gold" id="imSave">Save</button></div>');

  $("imSave").onclick = async () => {
    for (const inp of $("imList").querySelectorAll(".imCost")) {
      await sbUpdate("snack_items", "id=eq." + inp.dataset.id, { cost_price: inp.value === "" ? null : +inp.value });
    }
    for (const inp of $("imList").querySelectorAll(".imSale")) {
      await sbUpdate("snack_items", "id=eq." + inp.dataset.id, { sale_price: inp.value === "" ? null : +inp.value });
    }
    const newName = $("imNewName").value.trim();
    if (newName) {
      await sbInsert("snack_items", { name: newName, cost_price: +$("imNewCost").value || null, sale_price: +$("imNewSale").value || null });
    }
    closeModal(); toast("Items updated \u2713"); renderSnacks();
  };
}


function snackEditModal(d) {
  openModal('<h3>Edit entry <button class="x" onclick="closeModal()">\u2715</button></h3>' +
    '<label>Item</label><input id="seItem" value="' + esc(d.item) + '">' +
    '<div class="form-grid"><div><label>Quantity</label><input id="seQty" type="number" value="' + d.qty + '"></div>' +
    '<div><label>Price per unit</label><input id="sePrice" type="number" step="0.01" value="' + d.price + '"></div></div>' +
    '<div id="seTotal" class="small muted" style="margin:6px 0 4px">Total: ' + fmt(d.qty * d.price) + '</div>' +
    '<label>Person</label><input id="sePerson" value="' + esc(d.person) + '">' +
    '<div class="actions"><button class="btn btn-red" id="seDel">Delete</button><button class="btn btn-gold" id="seSave">Save</button></div>');
  const recalc = () => { $("seTotal").textContent = "Total: " + fmt((+$("seQty").value || 0) * (+$("sePrice").value || 0)); };
  $("seQty").oninput = recalc; $("sePrice").oninput = recalc;
  $("seSave").onclick = async () => {

    await sbUpdate("snack_entries", "id=eq." + d.id, { item: $("seItem").value.trim(), qty: qty, unit_price: price, amount: qty * price, person: $("sePerson").value.trim() || null });
    closeModal(); toast("Updated \u2713"); renderSnacks();
  };
  $("seDel").onclick = async () => {

    await sbDelete("snack_entries", "id=eq." + d.id); closeModal(); renderSnacks();
  };
}

/* =====================================================
   HEALTH \u2014 date-wise meal log (Excel-style)
===================================================== */
const MEALS = ["breakfast", "lunch", "dinner", "snacks"];
const MEAL_ICONS = { breakfast: "\u{1F305}", lunch: "\u2600\uFE0F", dinner: "\u{1F319}", snacks: "\u{1F36A}" };
const MEAL_LABELS = { breakfast: "Breakfast", lunch: "Lunch", dinner: "Dinner", snacks: "Snacks" };
let healthDays = 14;

async function renderHealth() {
  const since = new Date(Date.now() - (healthDays - 1) * 864e5).toISOString().slice(0, 10);
  const rows = await sbQuery("health_logs", "select=*&log_date=gte." + since + "&order=log_date.desc,logged_at.asc");
  if (activeTab !== "health") return;
  const today = todayStr();

  // Build date list (most recent first)
  const dates = [];
  for (let i = 0; i < healthDays; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    dates.push(d.toISOString().slice(0, 10));
  }

  // Group rows by date
  const byDate = {};
  dates.forEach(d => byDate[d] = { food: {}, vitals: [] });
  rows.forEach(r => {
    if (!byDate[r.log_date]) byDate[r.log_date] = { food: {}, vitals: [] };
    if (r.log_type === "food") byDate[r.log_date].food[r.meal_type] = r;
    else byDate[r.log_date].vitals.push(r);
  });

  // Build autocomplete suggestions per meal type from history
  const sugg = { breakfast: new Set(), lunch: new Set(), dinner: new Set(), snacks: new Set() };
  rows.forEach(r => { if (r.log_type === "food" && r.value_text) sugg[r.meal_type] && sugg[r.meal_type].add(r.value_text); });
  const datalists = MEALS.map(mt =>
    '<datalist id="dl_' + mt + '">' + Array.from(sugg[mt]).slice(0, 30).map(v => '<option value="' + esc(v) + '">').join("") + '</datalist>'
  ).join("");

  const sleepRows = rows.filter(r => r.log_type === "sleep");
  const avgSleep = sleepRows.length ? (sleepRows.reduce((a, b) => a + +b.value_num, 0) / sleepRows.length).toFixed(1) : "\u2014";
  const hrRows = rows.filter(r => r.log_type === "heart_rate");
  const avgHr = hrRows.length ? Math.round(hrRows.reduce((a, b) => a + +b.value_num, 0) / hrRows.length) : "\u2014";
  const burnRows = rows.filter(r => r.log_type === "burned" && r.log_date === today);
  const burnToday = burnRows.reduce((a, b) => a + +b.value_num, 0);

  $("main").innerHTML =
    '<div class="page-title"><span>\u2764\uFE0F Health log</span><div style="display:flex;gap:8px;flex-wrap:wrap">' +
      '<button class="btn btn-ghost btn-sm" id="copyLogBtn">\u{1F4CB} Copy log</button>' +
      '<button class="btn btn-ghost btn-sm" id="addVitalBtn">+ Sleep / HR / Burned</button>' +
      '<button class="btn btn-gold btn-sm" id="addMealBtn">+ Meal</button></div></div>' +
    '<div class="grid g4" style="margin-bottom:14px">' +
      '<div class="card stat"><div class="lbl">\u{1F634} Avg sleep (' + healthDays + 'd)</div><div class="val">' + avgSleep + '<span class="small muted"> hrs</span></div></div>' +
      '<div class="card stat"><div class="lbl">\u{1F493} Avg heart rate (' + healthDays + 'd)</div><div class="val">' + avgHr + '<span class="small muted"> bpm</span></div></div>' +
      '<div class="card stat"><div class="lbl">\u{1F3C3} Burned today</div><div class="val">' + Math.round(burnToday) + '<span class="small muted"> kcal</span></div></div>' +
      '<div class="card stat"><div class="lbl">\u{1F4C5} Showing</div><div class="val" style="font-size:19px">last ' + healthDays + ' days</div>' +
        '<button class="btn btn-ghost btn-sm" id="moreDaysBtn" style="margin-top:8px">Show 30 days</button></div></div>' +

    '<div class="card" style="overflow-x:auto"><div class="sec-title">\u{1F37D} Daily log</div>' +
    '<table style="width:100%;border-collapse:collapse;font-size:13px;min-width:560px">' +
    '<thead><tr><th style="text-align:left;padding:6px 8px;border-bottom:1px solid var(--border)">Date</th>' +
    MEALS.map(mt => '<th style="text-align:left;padding:6px 8px;border-bottom:1px solid var(--border)">' + MEAL_ICONS[mt] + ' ' + MEAL_LABELS[mt] + '</th>').join("") +
    '<th style="text-align:left;padding:6px 8px;border-bottom:1px solid var(--border)">Vitals</th></tr></thead><tbody>' +
    dates.map(d => {
      const day = byDate[d];
      const vitalsTxt = day.vitals.map(v => {
        if (v.log_type === "sleep") return "\u{1F634}" + v.value_num + "h";
        if (v.log_type === "heart_rate") return "\u{1F493}" + v.value_num;
        if (v.log_type === "burned") return "\u{1F3C3}" + v.value_num;
        if (v.log_type === "weight") return "\u2696" + v.value_num + "kg";
        return "";
      }).join(" ");
      return '<tr' + (d === today ? ' style="background:var(--gold-bg)"' : '') + '>' +
        '<td style="padding:6px 8px;border-bottom:1px solid var(--border);white-space:nowrap"><b>' + dateLabel(d) + '</b>' + (d === today ? ' <span class="small gold">today</span>' : "") + '</td>' +
        MEALS.map(mt => {
          const f = day.food[mt];
          return '<td style="padding:6px 8px;border-bottom:1px solid var(--border);cursor:pointer" class="mealCell" data-date="' + d + '" data-meal="' + mt + '" data-text="' + esc(f ? f.value_text : "") + '" data-id="' + (f ? f.id : "") + '">' +
            (f ? esc(f.value_text) : '<span class="muted">+ add</span>') + '</td>';
        }).join("") +
        '<td style="padding:6px 8px;border-bottom:1px solid var(--border);white-space:nowrap" class="small muted">' + (vitalsTxt || "\u2014") + '</td>' +
        '</tr>';
    }).join("") +
    '</tbody></table></div>' +
    '<p class="small muted" style="margin-top:12px">\u{1F4A1} Tap any cell to add or edit what you ate. Use \u201CCopy log\u201D at month-end to paste into an AI tool for a nutrition report \u2014 calories aren\u2019t auto-calculated here.</p>' +
    datalists;

  $("main").querySelectorAll(".mealCell").forEach(td => td.onclick = () => mealCellModal(td.dataset, sugg));
  $("addMealBtn").onclick = () => mealCellModal({ date: todayStr(), meal: "breakfast", text: "", id: "" }, sugg);
  $("moreDaysBtn").onclick = () => { healthDays = healthDays === 14 ? 30 : 14; renderHealth(); };
  $("copyLogBtn").onclick = () => copyHealthLog(dates, byDate);

  $("addVitalBtn").onclick = () => {
    openModal('<h3>Log vitals <button class="x" onclick="closeModal()">\u2715</button></h3>' +
      '<div class="seg" id="vitSeg"><button class="on" data-t="sleep">\u{1F634} Sleep</button><button data-t="heart_rate">\u{1F493} HR</button><button data-t="burned">\u{1F3C3} Burned</button><button data-t="weight">\u2696\uFE0F Weight</button></div>' +
      '<label id="vitLbl">Hours slept</label><input id="vitVal" type="number" step="0.1" placeholder="7.5">' +
      '<label>Date</label><input id="vitDate" type="date" value="' + todayStr() + '">' +
      '<div class="actions"><button class="btn btn-gold" id="vitSave">Save</button></div>');
    let vt = "sleep";
    const lbls = { sleep: "Hours slept", heart_rate: "Heart rate (bpm)", burned: "Calories burned (from Apple Watch)", weight: "Weight (kg)" };
    document.querySelectorAll("#vitSeg button").forEach(b => b.onclick = () => {
      document.querySelectorAll("#vitSeg button").forEach(x => x.classList.remove("on"));
      b.classList.add("on"); vt = b.dataset.t; $("vitLbl").textContent = lbls[vt];
    });
    $("vitSave").onclick = async () => {
      const v = +$("vitVal").value; if (!v) { toast("Enter value"); return; }
      await sbInsert("health_logs", { log_type: vt, value_num: v, log_date: $("vitDate").value });
      closeModal(); toast("Logged \u2713"); renderHealth();
    };
  };
}

function mealCellModal(d, sugg) {
  const mt = d.meal;
  openModal('<h3>' + MEAL_ICONS[mt] + ' ' + MEAL_LABELS[mt] + ' \u00b7 ' + dateLabel(d.date) + ' <button class="x" onclick="closeModal()">\u2715</button></h3>' +
    '<label>What did you eat?</label><input id="mcText" list="dl_' + mt + '" value="' + esc(d.text || "") + '" placeholder="e.g. 2 dosa, chicken gravy">' +
    '<p class="small muted" style="margin-top:6px">Type freely \u2014 your past entries show up as suggestions.</p>' +
    '<div class="actions">' +
    (d.id ? '<button class="btn btn-red" id="mcDel">Clear</button>' : '') +
    '<button class="btn btn-gold" id="mcSave">Save</button></div>');
  $("mcText").focus();
  $("mcSave").onclick = async () => {
    const t = $("mcText").value.trim();
    if (!t) { toast("Enter something or tap Clear"); return; }
    if (d.id) await sbUpdate("health_logs", "id=eq." + d.id, { value_text: t });
    else await sbInsert("health_logs", { log_type: "food", meal_type: mt, value_text: t, log_date: d.date });
    closeModal(); toast("Saved \u2713"); renderHealth();
  };
  if (d.id) {
    $("mcDel").onclick = async () => {
      await sbDelete("health_logs", "id=eq." + d.id);
      closeModal(); toast("Cleared"); renderHealth();
    };
  }
}

function copyHealthLog(dates, byDate) {
  let txt = "RaptorVault \u2014 Food log\n\n";
  dates.slice().reverse().forEach(d => {
    const day = byDate[d];
    const hasFood = MEALS.some(mt => day.food[mt]);
    if (!hasFood) return;
    txt += dateLabel(d) + " (" + d + ")\n";
    MEALS.forEach(mt => {
      if (day.food[mt]) txt += "  " + MEAL_LABELS[mt] + ": " + day.food[mt].value_text + "\n";
    });
    txt += "\n";
  });
  navigator.clipboard.writeText(txt).then(() => toast("Log copied \u2713 paste into your AI tool")).catch(() => toast("Could not copy"));
}

applyTheme(localStorage.getItem("rv_theme") || "dark");
(function () {
  const hp = new URLSearchParams(location.hash.slice(1));
  if (hp.get("type") === "recovery" && hp.get("access_token")) {
    recoveryToken = hp.get("access_token");
    authView("authReset");
    return;
  }
  try {
    const s = JSON.parse(localStorage.getItem("rv_session"));
    if (s && s.refresh_token) {
      SESSION = s;
      freshToken().then(() => { if (SESSION) startApp(); });
    }
  } catch (e) {}
})();
</script>
